services:
  backend:
    build: ./server
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:Cvdfer34@host.docker.internal:5432/edu_platform
      JWT_SECRET: your_very_secret_key_here
      # LLM_API_KEY, etc. should be in a separate .env file on the server
    volumes:
      - ./server:/app
    # Note: Using sh -c to wait for DB and run migrations
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./client
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot_etc:
  certbot_var:
